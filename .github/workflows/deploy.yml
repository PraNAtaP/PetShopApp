name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main # Robot akan bekerja otomatis setiap kali ada push ke branch main

# Beri izin kepada robot (GITHUB_TOKEN) untuk mengedit dan push ke repository
permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🏗️ Build Web App
        run: flutter build web --release --base-href "/PetShopApp/"

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true # Membersihkan history commit branch gh-pages agar tidak bengkak
